<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - Lumin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
        }

        .split-container {
            display: flex;
            min-height: 100vh;
        }

        /* Left side - Dark room with light bulb */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Light bulb container */
        .light-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Pull cord */
        .pull-cord {
            width: 3px;
            height: 80px;
            background: linear-gradient(to bottom, #888 0%, #555 100%);
            border-radius: 2px;
            margin-bottom: 0;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pullCordDrop 1s ease-out 0.5s forwards;
            transform-origin: top;
            height: 0;
        }

        @keyframes pullCordDrop {
            0% { height: 0; }
            100% { height: 80px; }
        }

        .pull-cord:hover {
            transform: scaleY(1.05);
        }

        .pull-cord::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #666;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Light bulb */
        .light-bulb {
            width: 100px;
            height: 140px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            transition: all 0.5s ease;
            box-shadow:
                inset 0 -20px 40px rgba(255,255,255,0.05),
                0 5px 20px rgba(0,0,0,0.3);
        }

        .light-bulb::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 15px;
            background: #444;
            border-radius: 0 0 5px 5px;
        }

        .light-bulb::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 10px;
            background: #333;
            border-radius: 2px;
        }

        /* Light bulb filament */
        .filament {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 50px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .filament::before,
        .filament::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 100%;
            background: #ff6b35;
            border-radius: 2px;
        }

        .filament::before {
            left: 8px;
            transform: rotate(-15deg);
        }

        .filament::after {
            right: 8px;
            transform: rotate(15deg);
        }

        /* Light glow effect */
        .light-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,230,109,0.4) 0%, rgba(255,230,109,0) 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        /* Room illumination */
        .room-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 30%, rgba(255,230,109,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        /* Light ON state */
        body.light-on .light-bulb {
            background: linear-gradient(to bottom, #ffe66d 0%, #ffed4e 100%);
            box-shadow:
                inset 0 -20px 40px rgba(255,200,0,0.3),
                0 0 60px rgba(255,230,109,0.8),
                0 0 100px rgba(255,230,109,0.4);
        }

        body.light-on .filament {
            opacity: 0.8;
            filter: blur(1px);
        }

        body.light-on .light-glow {
            opacity: 1;
        }

        body.light-on .room-light {
            opacity: 1;
        }

        body.light-on .left-side {
            background: linear-gradient(135deg, #2d3561 0%, #1f2544 100%);
        }

        /* Brand content below bulb */
        .brand-content {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 100px;
            padding: 40px;
            transition: all 0.8s ease;
        }

        body.light-on .brand-content {
            color: rgba(255,255,255,0.95);
        }

        .brand-logo {
            font-size: 4em;
            font-weight: 900;
            margin-bottom: 15px;
            transition: all 0.8s ease;
        }

        body.light-on .brand-logo {
            text-shadow: 0 0 20px rgba(255,230,109,0.5);
        }

        .brand-tagline {
            font-size: 1.8em;
            font-weight: 300;
            opacity: 0.8;
        }

        /* Right side - White login form */
        .right-side {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 3.5em;
            font-weight: 900;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            font-size: 1.2em;
            filter: drop-shadow(0 2px 4px rgba(102, 126, 234, 0.3));
        }

        .tagline {
            font-size: 1.4em;
            color: #666;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .welcome-title {
            font-size: 2.2em;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .welcome-subtitle {
            font-size: 1.1em;
            color: #999;
            margin-bottom: 50px;
            line-height: 1.6;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 22px 45px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.35);
            text-decoration: none;
            font-family: 'Heebo', sans-serif;
        }

        .google-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.45);
        }

        .google-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.35);
        }

        .google-icon {
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 5px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .google-icon svg {
            width: 22px;
            height: 22px;
        }

        .benefits {
            margin-top: 40px;
            text-align: right;
            padding-top: 30px;
        }

        .benefits-title {
            font-size: 1.05em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #666;
            font-size: 0.95em;
        }

        .benefit-bullet {
            color: #667eea;
            font-weight: 600;
        }

        .footer-note {
            margin-top: 50px;
            font-size: 0.95em;
            color: #999;
            line-height: 1.8;
        }

        .footer-note a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Initial loading animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .split-container {
                flex-direction: column;
            }

            .left-side {
                min-height: 400px;
            }

            .brand-content {
                margin-top: 60px;
            }

            .brand-logo {
                font-size: 3em;
            }

            .brand-tagline {
                font-size: 1.4em;
            }

            .right-side {
                padding: 60px 30px;
            }

            .logo {
                font-size: 2.8em;
            }

            .welcome-title {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- Left side - Dark room with light bulb -->
        <div class="left-side">
            <div class="room-light"></div>

            <div style="text-align: center;">
                <div class="light-container">
                    <div class="pull-cord" id="pullCord"></div>
                    <div class="light-bulb">
                        <div class="filament"></div>
                    </div>
                    <div class="light-glow"></div>
                </div>

                <div class="brand-content">
                    <div class="brand-logo">
                        Lumin ✨
                    </div>
                    <p class="brand-tagline">האור של העסק שלך</p>
                </div>
            </div>
        </div>

        <!-- Right side - Login form -->
        <div class="right-side">
            <div class="login-container">
                <div class="logo">
                    <span class="logo-text">Lumin</span>
                    <span class="logo-icon">✨</span>
                </div>
                <p class="tagline">האור של העסק שלך</p>

                <h1 class="welcome-title">ברוכים הבאים!</h1>
                <p class="welcome-subtitle">התחבר עם Google כדי להתחיל לנהל את העסק שלך</p>

                <a href="/accounts/google/login/" class="google-btn">
                    <span class="google-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </span>
                    התחבר עם Google
                </a>

                <div class="benefits">
                    <div class="benefits-title">מה תקבל:</div>
                    <div class="benefit-item">
                        <span class="benefit-bullet">•</span>
                        <span>התחברות מהירה וחוסכת בזמן</span>
                    </div>
                    <div class="benefit-item">
                        <span class="benefit-bullet">•</span>
                        <span>אבטחה מקסימלית עם Google</span>
                    </div>
                    <div class="benefit-item">
                        <span class="benefit-bullet">•</span>
                        <span>ללא סיסמאות לזכור</span>
                    </div>
                </div>

                <div class="footer-note">
                    בהתחברות אתה מסכים ל<a href="#">תנאי השימוש</a> ול<a href="#">מדיניות הפרטיות</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto turn on light after page load
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.body.classList.add('light-on');
            }, 1500);
        });

        // Toggle light on pull cord click
        document.getElementById('pullCord').addEventListener('click', function() {
            document.body.classList.toggle('light-on');

            // Animate pull
            this.style.transform = 'translateY(10px)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
        });
    </script>
</body>
</html>
