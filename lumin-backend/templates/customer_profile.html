<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל לקוח - Lumin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --lumin-turquoise: #00ADB5;
            --lumin-turquoise-light: #00CED6;
            --lumin-dark: #0F2027;
            --lumin-dark-secondary: #1E293B;
            --lumin-dark-tertiary: #2C5364;
            --light-bg: #F8FAFC;
            --light-card: rgba(255, 255, 255, 0.7);
            --text-dark: #1E293B;
            --text-light: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light-bg);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--light-card);
            border: 1px solid rgba(0, 173, 181, 0.2);
            border-radius: 12px;
            color: var(--lumin-turquoise);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 173, 181, 0.1);
            transform: translateX(4px);
        }

        .profile-header {
            background: linear-gradient(135deg, var(--lumin-dark-secondary), var(--lumin-dark));
            border-radius: 20px;
            padding: 32px;
            color: white;
            margin-bottom: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .profile-header-content {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--lumin-turquoise), var(--lumin-turquoise-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 30px rgba(0, 173, 181, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 173, 181, 0.7);
        }

        .profile-info h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .profile-meta {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .profile-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 10px;
        }

        .profile-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .action-button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--lumin-turquoise), var(--lumin-turquoise-light));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 173, 181, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(0, 173, 181, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tabs {
            background: var(--light-card);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(0, 173, 181, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--lumin-turquoise), var(--lumin-turquoise-light));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 173, 181, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--light-card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .treatments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .treatment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .treatment-item:hover {
            box-shadow: 0 4px 12px rgba(0, 173, 181, 0.1);
            transform: translateY(-2px);
        }

        .treatment-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .treatment-meta {
            font-size: 14px;
            color: #64748B;
        }

        .treatment-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--lumin-turquoise);
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 14px;
            color: #64748B;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(0, 173, 181, 0.05), rgba(0, 173, 181, 0.02));
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: ' *';
            color: var(--danger);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(0, 173, 181, 0.2);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--lumin-turquoise);
            box-shadow: 0 0 0 3px rgba(0, 173, 181, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .modal-btn-cancel {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-dark);
        }

        .modal-btn-cancel:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-btn-submit {
            background: linear-gradient(135deg, var(--lumin-turquoise), var(--lumin-turquoise-light));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 173, 181, 0.3);
        }

        .modal-btn-submit:hover {
            box-shadow: 0 8px 20px rgba(0, 173, 181, 0.5);
            transform: translateY(-2px);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .stat-label {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--lumin-turquoise);
        }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .back-btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .profile-header {
                padding: 24px 20px;
            }

            .profile-header-content {
                flex-direction: column;
                text-align: center;
                gap: 16px;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .profile-info h1 {
                font-size: 24px;
            }

            .profile-meta {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }

            .profile-actions {
                margin-left: 0;
                margin-top: 16px;
                width: 100%;
                justify-content: center;
            }

            .action-button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-value {
                font-size: 22px;
            }

            .tabs {
                padding: 4px;
                gap: 4px;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 13px;
            }

            .card {
                padding: 16px;
            }

            .card-title {
                font-size: 18px;
            }

            .treatment-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .modal {
                width: 95%;
                max-width: none;
            }

            .modal-header {
                padding: 20px 24px;
            }

            .modal-title {
                font-size: 20px;
            }

            .modal-body {
                padding: 24px;
            }

            .modal-footer {
                padding: 16px 24px;
                flex-direction: column-reverse;
            }

            .modal-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            .profile-header {
                padding: 20px 16px;
            }

            .profile-avatar {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }

            .profile-info h1 {
                font-size: 20px;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 8px 10px;
                font-size: 12px;
            }

            .card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/api/customers/" class="back-btn">
            <span>←</span>
            <span>חזרה לרשימת לקוחות</span>
        </a>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-header-content">
                <div class="profile-avatar" id="customerAvatar" onclick="openImageUpload()" ontouchstart="openImageUpload()" title="לחץ להעלאת תמונת פרופיל">👤</div>
                <div class="profile-info">
                    <h1 id="customerName">טוען...</h1>
                    <div class="profile-meta">
                        <div class="profile-meta-item">
                            <span>📧</span>
                            <span id="customerEmail">-</span>
                        </div>
                        <div class="profile-meta-item">
                            <span>📱</span>
                            <span id="customerPhone">-</span>
                        </div>
                        <div class="profile-meta-item">
                            <span>🏷️</span>
                            <span id="customerType">-</span>
                        </div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="action-button btn-primary" onclick="openEditModal()">
                        <span>✏️</span>
                        <span>ערוך לקוח</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">סה"כ טיפולים</div>
                <div class="stat-value" id="totalTreatments">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">סכום טיפולים</div>
                <div class="stat-value">₪<span id="treatmentTotal">0</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">סה"כ רכישות</div>
                <div class="stat-value" id="totalPurchases">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">סכום רכישות</div>
                <div class="stat-value">₪<span id="purchaseTotal">0</span></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('treatments')">
                <span>💆</span>
                <span>טיפולים</span>
            </button>
            <button class="tab-btn" onclick="switchTab('purchases')">
                <span>🛒</span>
                <span>רכישות</span>
            </button>
            <button class="tab-btn" onclick="switchTab('notes')">
                <span>📝</span>
                <span>הערות</span>
            </button>
        </div>

        <!-- Treatments Tab -->
        <div class="tab-content active" id="tab-treatments">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">היסטוריית טיפולים</h3>
                    <button class="action-button btn-primary" onclick="openAddTreatmentModal()">
                        <span>➕</span>
                        <span>הוסף טיפול</span>
                    </button>
                </div>
                <div class="treatments-list" id="treatmentsList">
                    <div class="empty-state">
                        <div class="empty-icon">💆</div>
                        <div class="empty-title">אין טיפולים עדיין</div>
                        <div class="empty-text">הוסף את הטיפול הראשון ללקוח זה</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Purchases Tab -->
        <div class="tab-content" id="tab-purchases">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">היסטוריית רכישות</h3>
                </div>
                <div class="empty-state">
                    <div class="empty-icon">🛒</div>
                    <div class="empty-title">אין רכישות עדיין</div>
                    <div class="empty-text">רכישות יופיעו כאן לאחר הוספתן</div>
                </div>
            </div>
        </div>

        <!-- Notes Tab -->
        <div class="tab-content" id="tab-notes">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">הערות כלליות</h3>
                </div>
                <form id="notesForm">
                    <div class="form-group">
                        <label class="form-label">הערות</label>
                        <textarea id="generalNotes" class="form-textarea" placeholder="הערות כלליות על הלקוח..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">הערות רפואיות</label>
                        <textarea id="medicalNotes" class="form-textarea" placeholder="הערות רפואיות חשובות..."></textarea>
                    </div>
                    <button type="submit" class="action-button btn-primary">
                        <span>💾</span>
                        <span>שמור הערות</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Treatment Modal -->
    <div class="modal-overlay" id="treatmentModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <span>💆</span>
                    <span>הוסף טיפול חדש</span>
                </div>
                <button class="modal-close" onclick="closeTreatmentModal()">✕</button>
            </div>

            <form id="treatmentForm" class="modal-body">
                <div class="form-group">
                    <label class="form-label required">סוג טיפול</label>
                    <div style="display: flex; gap: 12px; margin-bottom: 8px;">
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="treatment_type_option" value="existing" checked onchange="toggleTreatmentTypeInput()">
                            <span>בחר קיים</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="treatment_type_option" value="new" onchange="toggleTreatmentTypeInput()">
                            <span>הוסף חדש</span>
                        </label>
                    </div>
                    <select name="treatment_type" id="treatmentType" class="form-select">
                        <option value="">בחר סוג טיפול...</option>
                    </select>
                    <input type="text" name="new_treatment_type_name" id="newTreatmentTypeName" class="form-input" placeholder="שם הטיפול החדש" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label required">תאריך טיפול</label>
                    <input type="date" name="treatment_date" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">מטפל</label>
                    <div style="display: flex; gap: 12px; margin-bottom: 8px;">
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="staff_option" value="existing" checked onchange="toggleStaffInput()">
                            <span>בחר קיים</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="staff_option" value="new" onchange="toggleStaffInput()">
                            <span>הוסף חדש</span>
                        </label>
                    </div>
                    <select name="staff_member" id="staffMember" class="form-select">
                        <option value="">בחר מטפל...</option>
                    </select>
                    <input type="text" name="new_staff_name" id="newStaffName" class="form-input" placeholder="שם המטפל/ת החדש/ה" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label required">מחיר</label>
                    <input type="number" name="price" class="form-input" placeholder="0.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label class="form-label">הערות</label>
                    <textarea name="notes" class="form-textarea" placeholder="הערות על הטיפול..."></textarea>
                </div>
            </form>

            <div class="modal-footer">
                <button type="button" class="modal-btn modal-btn-cancel" onclick="closeTreatmentModal()">ביטול</button>
                <button type="submit" form="treatmentForm" class="modal-btn modal-btn-submit">הוסף טיפול</button>
            </div>
        </div>
    </div>

    <!-- Edit Customer Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <span>✏️</span>
                    <span>ערוך פרטי לקוח</span>
                </div>
                <button class="modal-close" onclick="closeEditModal()">✕</button>
            </div>

            <form id="editForm" class="modal-body">
                <div class="form-group">
                    <label class="form-label required">שם פרטי</label>
                    <input type="text" name="first_name" id="editFirstName" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label required">שם משפחה</label>
                    <input type="text" name="last_name" id="editLastName" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">אימייל</label>
                    <input type="email" name="email" id="editEmail" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label required">טלפון</label>
                    <input type="tel" name="phone" id="editPhone" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">סוג לקוח</label>
                    <select name="customer_type" id="editCustomerType" class="form-select">
                        <option value="INDIVIDUAL">פרטי</option>
                        <option value="PRIVATE">Private Customer</option>
                        <option value="BUSINESS">עסקי</option>
                        <option value="TREATMENT">טיפול</option>
                        <option value="VIP">VIP</option>
                    </select>
                </div>
            </form>

            <div class="modal-footer">
                <button type="button" class="modal-btn modal-btn-cancel" onclick="closeEditModal()">ביטול</button>
                <button type="submit" form="editForm" class="modal-btn modal-btn-submit">שמור שינויים</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for image upload -->
    <input type="file" id="profileImageInput" accept="image/*" style="display: none;">

    <script>
        // Get customer ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id') || window.location.pathname.split('/').filter(x => x).pop();
        let customerData = null;

        // Get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Fetch customer data
        async function loadCustomer() {
            try {
                const response = await fetch(`/api/customers/api/customers/${customerId}/`);
                customerData = await response.json();

                // Update header
                document.getElementById('customerName').textContent = customerData.full_name;
                document.getElementById('customerEmail').textContent = customerData.email || '-';
                document.getElementById('customerPhone').textContent = customerData.phone;
                document.getElementById('customerType').textContent = customerData.customer_type_display || customerData.customer_type;

                // Update statistics
                document.getElementById('totalTreatments').textContent = customerData.treatment_count || 0;
                document.getElementById('treatmentTotal').textContent = Number(customerData.total_treatments || 0).toLocaleString();
                document.getElementById('totalPurchases').textContent = customerData.purchase_count || 0;
                document.getElementById('purchaseTotal').textContent = Number(customerData.total_purchases || 0).toLocaleString();

                // Update notes
                document.getElementById('generalNotes').value = customerData.notes || '';
                document.getElementById('medicalNotes').value = customerData.medical_notes || '';

                // Update profile image if exists
                updateProfileImage();

                // Load treatments
                await loadTreatments();

                // Load treatment types and staff
                await loadTreatmentTypes();
                await loadStaffMembers();
            } catch (error) {
                console.error('Error loading customer:', error);
                alert('שגיאה בטעינת נתוני הלקוח');
            }
        }

        // Update profile image display
        function updateProfileImage() {
            if (customerData && customerData.profile_image) {
                const avatar = document.getElementById('customerAvatar');
                avatar.style.background = `url('${customerData.profile_image}') center/cover no-repeat`;
                avatar.innerHTML = '<div style="opacity: 0;">👤</div>';
            }
        }

        // Open image upload dialog
        function openImageUpload(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const input = document.getElementById('profileImageInput');
            setTimeout(() => {
                input.click();
            }, 100);
        }

        // Handle image upload
        document.getElementById('profileImageInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('profile_image', file);

            try {
                const csrftoken = getCookie('csrftoken');
                const response = await fetch(`/api/customers/api/customers/${customerId}/`, {
                    method: 'PATCH',
                    headers: {
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin',
                    body: formData
                });

                if (response.ok) {
                    await loadCustomer();
                    alert('תמונת הפרופיל עודכנה בהצלחה! ✓');
                } else {
                    const error = await response.json();
                    alert('שגיאה בהעלאת התמונה: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error uploading image:', error);
                alert('שגיאה בהעלאת התמונה');
            }

            // Reset input
            this.value = '';
        });

        // Load treatments
        async function loadTreatments() {
            try {
                const response = await fetch(`/api/customers/api/treatments/?customer=${customerId}`);
                const data = await response.json();
                const treatments = data.results || data || [];

                const list = document.getElementById('treatmentsList');

                if (treatments.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">💆</div>
                            <div class="empty-title">אין טיפולים עדיין</div>
                            <div class="empty-text">הוסף את הטיפול הראשון ללקוח זה</div>
                        </div>
                    `;
                } else {
                    list.innerHTML = treatments.map(treatment => `
                        <div class="treatment-item">
                            <div class="treatment-info">
                                <h4>${treatment.treatment_name}</h4>
                                <div class="treatment-meta">
                                    📅 ${new Date(treatment.treatment_date).toLocaleDateString('he-IL')}
                                    ${treatment.staff_member_name ? `• 👤 ${treatment.staff_member_name}` : ''}
                                </div>
                                ${treatment.notes ? `<div class="treatment-meta">💬 ${treatment.notes}</div>` : ''}
                            </div>
                            <div class="treatment-price">₪${Number(treatment.price).toLocaleString()}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading treatments:', error);
            }
        }

        // Load treatment types
        async function loadTreatmentTypes() {
            try {
                const response = await fetch('/api/customers/api/treatment-types/');
                const data = await response.json();
                const types = (data.results || data || []).filter(t => t.is_active);

                const select = document.getElementById('treatmentType');
                select.innerHTML = '<option value="">בחר סוג טיפול...</option>' +
                    types.map(type => `<option value="${type.id}" data-price="${type.default_price || 0}">${type.name}</option>`).join('');

                // Auto-fill price when treatment type changes
                select.addEventListener('change', function() {
                    const selected = this.options[this.selectedIndex];
                    if (selected.dataset.price) {
                        document.querySelector('[name="price"]').value = selected.dataset.price;
                    }
                });
            } catch (error) {
                console.error('Error loading treatment types:', error);
            }
        }

        // Load staff members
        async function loadStaffMembers() {
            try {
                const response = await fetch('/api/customers/api/staff-members/');
                const data = await response.json();
                const staff = (data.results || data || []).filter(s => s.is_active);

                const select = document.getElementById('staffMember');
                select.innerHTML = '<option value="">בחר מטפל...</option>' +
                    staff.map(member => `<option value="${member.id}">${member.full_name}</option>`).join('');
            } catch (error) {
                console.error('Error loading staff members:', error);
            }
        }

        // Toggle between existing staff and new staff input
        function toggleStaffInput() {
            const option = document.querySelector('input[name="staff_option"]:checked').value;
            const staffSelect = document.getElementById('staffMember');
            const newStaffInput = document.getElementById('newStaffName');

            if (option === 'existing') {
                staffSelect.style.display = 'block';
                newStaffInput.style.display = 'none';
                newStaffInput.value = '';
            } else {
                staffSelect.style.display = 'none';
                newStaffInput.style.display = 'block';
                staffSelect.value = '';
            }
        }

        // Toggle between existing treatment type and new treatment type input
        function toggleTreatmentTypeInput() {
            const option = document.querySelector('input[name="treatment_type_option"]:checked').value;
            const typeSelect = document.getElementById('treatmentType');
            const newTypeInput = document.getElementById('newTreatmentTypeName');

            if (option === 'existing') {
                typeSelect.style.display = 'block';
                newTypeInput.style.display = 'none';
                newTypeInput.value = '';
                typeSelect.required = true;
                newTypeInput.required = false;
            } else {
                typeSelect.style.display = 'none';
                newTypeInput.style.display = 'block';
                typeSelect.value = '';
                typeSelect.required = false;
                newTypeInput.required = true;
            }
        }

        // Tab switching
        function switchTab(tabName) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Modal functions
        function openAddTreatmentModal() {
            document.getElementById('treatmentModal').classList.add('active');
            document.getElementById('treatmentForm').reset();

            // Reset to "existing" options
            document.querySelector('input[name="staff_option"][value="existing"]').checked = true;
            document.querySelector('input[name="treatment_type_option"][value="existing"]').checked = true;
            toggleStaffInput();
            toggleTreatmentTypeInput();
        }

        function closeTreatmentModal() {
            document.getElementById('treatmentModal').classList.remove('active');
        }

        function openEditModal() {
            document.getElementById('editModal').classList.add('active');

            // Fill form with current data
            if (customerData) {
                document.getElementById('editFirstName').value = customerData.first_name;
                document.getElementById('editLastName').value = customerData.last_name;
                document.getElementById('editEmail').value = customerData.email || '';
                document.getElementById('editPhone').value = customerData.phone;
                document.getElementById('editCustomerType').value = customerData.customer_type;
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // Add treatment form submission
        document.getElementById('treatmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const staffOption = document.querySelector('input[name="staff_option"]:checked').value;
            const treatmentTypeOption = document.querySelector('input[name="treatment_type_option"]:checked').value;
            const csrftoken = getCookie('csrftoken');

            try {
                let staffMemberId = formData.get('staff_member') || null;
                let treatmentTypeId = formData.get('treatment_type') || null;

                // If creating new treatment type, create it first
                if (treatmentTypeOption === 'new') {
                    const newTypeName = formData.get('new_treatment_type_name');
                    if (!newTypeName || newTypeName.trim() === '') {
                        alert('נא להזין שם טיפול');
                        return;
                    }

                    // Create new treatment type
                    const typeResponse = await fetch('/api/customers/api/treatment-types/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrftoken
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify({
                            name: newTypeName.trim(),
                            is_active: true
                        })
                    });

                    if (!typeResponse.ok) {
                        const error = await typeResponse.json();
                        alert('שגיאה ביצירת סוג טיפול חדש: ' + JSON.stringify(error));
                        return;
                    }

                    const newType = await typeResponse.json();
                    treatmentTypeId = newType.id;

                    // Reload treatment types list for future use
                    await loadTreatmentTypes();
                }

                // If creating new staff member, create it
                if (staffOption === 'new') {
                    const newStaffName = formData.get('new_staff_name');
                    if (!newStaffName || newStaffName.trim() === '') {
                        alert('נא להזין שם מטפל');
                        return;
                    }

                    // Create new staff member
                    const staffResponse = await fetch('/api/customers/api/staff-members/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrftoken
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify({
                            full_name: newStaffName.trim(),
                            is_active: true
                        })
                    });

                    if (!staffResponse.ok) {
                        const error = await staffResponse.json();
                        alert('שגיאה ביצירת מטפל חדש: ' + JSON.stringify(error));
                        return;
                    }

                    const newStaff = await staffResponse.json();
                    staffMemberId = newStaff.id;

                    // Reload staff members list for future use
                    await loadStaffMembers();
                }

                // Now create the treatment
                const treatmentData = {
                    customer: customerId,
                    treatment_type: treatmentTypeId,
                    treatment_date: formData.get('treatment_date'),
                    staff_member: staffMemberId,
                    price: formData.get('price'),
                    notes: formData.get('notes') || ''
                };

                const response = await fetch('/api/customers/api/treatments/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify(treatmentData)
                });

                if (response.ok) {
                    closeTreatmentModal();
                    await loadCustomer(); // Reload to update stats
                    await loadTreatments();
                    alert('הטיפול נוסף בהצלחה! ✓');
                } else {
                    const error = await response.json();
                    alert('שגיאה בהוספת הטיפול: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error adding treatment:', error);
                alert('שגיאה בהוספת הטיפול');
            }
        });

        // Edit customer form submission
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const customerUpdate = {
                first_name: formData.get('first_name'),
                last_name: formData.get('last_name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                customer_type: formData.get('customer_type')
            };

            try {
                const csrftoken = getCookie('csrftoken');
                const response = await fetch(`/api/customers/api/customers/${customerId}/`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify(customerUpdate)
                });

                if (response.ok) {
                    closeEditModal();
                    await loadCustomer();
                    alert('הלקוח עודכן בהצלחה! ✓');
                } else {
                    const error = await response.json();
                    alert('שגיאה בעדכון הלקוח: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error updating customer:', error);
                alert('שגיאה בעדכון הלקוח');
            }
        });

        // Save notes form submission
        document.getElementById('notesForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const notesData = {
                notes: document.getElementById('generalNotes').value,
                medical_notes: document.getElementById('medicalNotes').value
            };

            try {
                const csrftoken = getCookie('csrftoken');
                const response = await fetch(`/api/customers/api/customers/${customerId}/`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify(notesData)
                });

                if (response.ok) {
                    alert('ההערות נשמרו בהצלחה! ✓');
                } else {
                    alert('שגיאה בשמירת ההערות');
                }
            } catch (error) {
                console.error('Error saving notes:', error);
                alert('שגיאה בשמירת ההערות');
            }
        });

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadCustomer();
        });
    </script>
</body>
</html>
