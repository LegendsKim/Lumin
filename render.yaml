services:
  - type: web
    name: lumin-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd lumin-backend && chmod +x build.sh && ./build.sh
    startCommand: cd lumin-backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: lumin-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://lumin-web.onrender.com,http://localhost:3000
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com

databases:
  - name: lumin-db
    plan: free
    ipAllowList: []
